query PathCheck(
  $source_id: String!
  $destination_id: String!
  $max_depth: Int
  $max_paths: Int
) {
  InfrahubPathTraversal(
    data: {
      source_id: $source_id
      destination_id: $destination_id
      max_depth: $max_depth
      max_paths: $max_paths
      # All loopless paths, not just the shortest-through-each-intermediate
      # subset. A reachability rule must see every way source reaches
      # destination so "transit AS64496" is judged on genuine peering paths,
      # not only the co-membership shortcut. Requires Infrahub >= 1.10.1.
      shortest_paths_only: false
      excluded_kinds: ["TopologyReachabilityRule", "TopologyReachabilityConstraint"]
    }
  ) {
    paths {
      hops {
        node {
          id
          kind
          hfid
          display_label
        }
      }
      depth
    }
    source {
      id
      display_label
    }
    destination {
      id
      display_label
    }
    count
  }
}
