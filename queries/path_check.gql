# Placeholder query, kept only to satisfy ``InfrahubCheck``'s requirement
# that ``query`` name a registered GraphQL query. The reachability check
# does NOT execute this query: it overrides ``collect_data`` and drives
# the traversal through the SDK's first-class
# ``client.traverse_paths(..., shortest_paths_only=False)`` helper
# (infrahub-sdk 1.22.1+, Infrahub 1.10.1+). Delegating to the SDK means
# there is no hand-maintained ``InfrahubPathTraversal`` query to keep in
# sync with the server schema — which is the whole point of moving off the
# reverse-engineered GraphQL. This trivially selects the rule kind so the
# stored query registers cleanly during repo-sync.
query PathCheck {
  TopologyReachabilityRule {
    edges {
      node {
        id
        __typename
      }
    }
  }
}
