---
# Constraints are predicates evaluated against every hop on every path the
# traversal returns. Three polarities:
#   required  — every returned path must contain at least one matching hop
#   forbidden — no returned path may contain a matching hop
#   any_of    — at least one any_of constraint must match per path
# A constraint matches a hop when the hop's schema kind equals hop_kind, and
# (if attribute_name is set) the hop node's attribute value equals
# attribute_value (compared as strings after bool normalization).
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: TopologyReachabilityConstraint
  data:
    - rule: edge-pair-multi-asn
      polarity: any_of
      hop_kind: InfraAutonomousSystem
      attribute_name: asn
      attribute_value: "65001"

    - rule: edge-pair-multi-asn
      polarity: any_of
      hop_kind: InfraAutonomousSystem
      attribute_name: asn
      attribute_value: "65002"

    - rule: edge-pair-multi-asn
      polarity: forbidden
      hop_kind: InfraAutonomousSystem
      attribute_name: asn
      attribute_value: "65999"

    - rule: edge-to-rr-via-65001
      polarity: required
      hop_kind: InfraAutonomousSystem
      attribute_name: asn
      attribute_value: "65001"
