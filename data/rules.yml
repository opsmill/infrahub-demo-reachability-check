---
# Each TopologyReachabilityRule pairs two graph nodes (source, destination) and
# carries traversal limits + an enabled flag. The constraints that the path
# must satisfy live as separate TopologyReachabilityConstraint nodes, linked back
# to the rule (see constraints.yml).
#
# source and destination have peer: CoreNode, so any node kind works. The
# `infrahubctl object load` path requires a UUID reference for polymorphic
# peers — list the rules here as templates and use the supplied
# scripts/bootstrap.py to resolve hfids → UUIDs and create the rules via
# the SDK, OR replace each placeholder with a real UUID from your instance.
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: TopologyReachabilityRule
  data:
    - name: edge-pair-multi-asn
      description: "ATL ↔ NYC: must transit ASN 65001 or 65002, never 65999."
      max_depth: 8
      max_paths: 50
      enabled: true
      source: "<uuid-of-source-node>"          # replace, or run scripts/bootstrap.py
      destination: "<uuid-of-destination-node>"
      member_of_groups:
        - reachability-rules

    - name: edge-to-rr-via-65001
      description: "LAX edge to the route reflector must transit ASN 65001."
      max_depth: 6
      max_paths: 25
      enabled: true
      source: "<uuid-of-source-node>"
      destination: "<uuid-of-destination-node>"
      member_of_groups:
        - reachability-rules
