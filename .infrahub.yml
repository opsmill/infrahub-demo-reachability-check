---
schemas:
  - schemas/reachability.yml

menus:
  - menus/reachability.yml

queries:
  - name: path_check
    file_path: queries/path_check.gql
  - name: rule_url
    file_path: queries/rule_url.gql

# Python transform that backs the `path_traversal_url` computed attribute
# on `TopologyReachabilityRule`. Runs server-side whenever a rule (or its
# dependencies) changes; the returned string is stored on the rule and read
# by the check at evaluation time.
python_transforms:
  - name: path_traversal_url
    class_name: PathTraversalUrl
    file_path: transforms/path_traversal_url.py

# The check fans out over the reachability-rules group. The runner extracts
# the listed path expressions from each member rule into self.params. The
# rule_id lets the check fetch the rule node together with its constraint
# children at run time.
check_definitions:
  - name: reachability_assertion
    class_name: PathAssertionCheck
    file_path: checks/path_assertion.py
    targets: reachability-rules
    parameters:
      rule_id: "id"
      source_id: "source__id"
      destination_id: "destination__id"
      max_depth: "max_depth__value"
      max_paths: "max_paths__value"
      enabled: "enabled__value"
